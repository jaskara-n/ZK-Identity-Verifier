version: "3.9"
services:
  api:
    image: node:20
    working_dir: /workspace
    command: sh -c "yarn install && yarn build:zk && yarn dev:api"
    ports:
      - "5000:5000"
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      NODE_ENV: development
      SESSION_TTL_MINUTES: 10
      PROOF_SECRET: change-this-proof-secret-in-prod
      JWT_SECRET: change-this-jwt-secret-in-prod
      JWT_TTL_SECONDS: 3600
      CORS_ORIGIN: "*"
      INTERNAL_API_KEY: change-this-internal-api-key-in-prod
    volumes:
      - .:/workspace

  verifier:
    image: node:20
    working_dir: /workspace
    command: sh -c "yarn install && yarn dev:verifier"
    ports:
      - "5050:5050"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 5050
      BACKEND_URL: http://api:5000
      INTERNAL_API_KEY: change-this-internal-api-key-in-prod
    depends_on:
      - api
    volumes:
      - .:/workspace
